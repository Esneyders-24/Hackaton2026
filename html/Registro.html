<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despacho presidencial</title>
    <link rel="stylesheet" href="../css/registro.css">
</head>
<body>
     <div class="Registro">
            <div class="Registro-image">

                <img src="../img/LogoPeru.png" alt="">
            </div>
            <div class="registrocontainer">
                <h1>Registro</h1>
                <form >
                    <div class="registro-group">
                        <label for="DNi">Ingrese su DNI</label>
                        <input type="text" id="DNI" name="DNI" placeholder="8 digitos" required>
                    </div>
                    <div class="registro-group">
                        <label for="crearContraseña" >Crea tu contrseña</label>
                        <input type="password" id="contrseña" name="contrseña" placeholder="Cracteristicas diferente" required>
                    </div>
                    <a href="/html/index.html"></a>
                    <button type="submit">Listo</button>
                </form>
            </div>
     </div>
</body>
</html>
