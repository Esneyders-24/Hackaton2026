<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despacho presidencial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="loginform">
        <div class="login-image">
          
            <img src="/img/LogoPeru.png" alt="Imagen lateral">
        </div>
        <div class="formcontainer">
            <h1>Iniciar Sesion</h1>
            <form>
                <div class="form-group">
                    <label for="username">Email</label>
                    <input type="text" id="username" name="username" placeholder="Nombre de usuario" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Entre su password" required>
                </div>
                <button type="submit">Login</button>
                
                <p class="signup-link">¿No tiene cuenta? <a href="#">Registrarse</a></p>
            </form>
        </div>
    </div>
</body>
</html>
